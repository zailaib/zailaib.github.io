<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>细胞分裂 · Cell Division 3D</title>
<link rel="stylesheet" href="../shared/theme.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<button id="theme-btn" title="切换主题">☀️</button>

<div id="loading"><div class="loader"></div><span>加载中...</span></div>
<div id="error-msg"></div>
<div id="container"></div>

<!-- Phase indicator -->
<div id="phase-bar">
  <div class="phase-step" data-phase="interphase">间期</div>
  <div class="phase-step" data-phase="prophase">前期</div>
  <div class="phase-step" data-phase="metaphase">中期</div>
  <div class="phase-step" data-phase="anaphase">后期</div>
  <div class="phase-step" data-phase="telophase">末期</div>
  <div class="phase-step" data-phase="cytokinesis">胞质分裂</div>
</div>

<!-- Info -->
<div id="phase-info">
  <div class="phase-title">间期 · Interphase</div>
  <div class="phase-desc">DNA 复制，染色质松散分布于细胞核中</div>
</div>

<!-- Controls -->
<div id="controls">
  <button id="btn-prev" title="上一步">⏮</button>
  <button id="btn-play" title="播放/暂停">▶</button>
  <button id="btn-next" title="下一步">⏭</button>
  <button id="btn-reset" title="重置">↺</button>
  <label class="speed-label">速度</label>
  <input type="range" id="speed-slider" min="0.2" max="3" step="0.1" value="0.6">
</div>

<!-- Progress scrubber -->
<div id="timeline">
  <input type="range" id="progress-slider" min="0" max="1" step="0.001" value="0">
</div>

<div id="hint">🖱 拖拽旋转 · 滚轮缩放 · 拖动底部进度条或点击播放</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "/games/shared/": "/games/shared/"
  }
}
</script>
<script type="module" src="app.js"></script>
</body>
</html>
