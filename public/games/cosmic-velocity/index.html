<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>宇宙速度 · Cosmic Velocity 3D</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container"></div>

<div id="top-bar">
  <h1>🚀 宇宙速度 · Cosmic Velocity</h1>
  <div class="sub">Orbital Mechanics Demo</div>
</div>

<!-- View toggle -->
<div id="view-toggle">
  <button class="view-btn active" data-view="earth">🌍 地球轨道</button>
  <button class="view-btn" data-view="solar">☀️ 太阳系</button>
</div>

<!-- Velocity markers -->
<div id="markers">
  <div class="marker" data-speed="0"><span class="marker-dot" style="background:#ff4444"></span>坠落</div>
  <div class="marker" data-speed="7.9"><span class="marker-dot" style="background:#44ff88"></span>第一宇宙速度 7.9</div>
  <div class="marker" data-speed="11.2"><span class="marker-dot" style="background:#44aaff"></span>第二宇宙速度 11.2</div>
  <div class="marker" data-speed="16.7"><span class="marker-dot" style="background:#aa44ff"></span>第三宇宙速度 16.7</div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-item">
    <div class="hud-label">当前速度</div>
    <div class="hud-value" id="hud-speed">0.0 km/s</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">轨道高度</div>
    <div class="hud-value" id="hud-alt">200 km</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">轨道类型</div>
    <div class="hud-value" id="hud-type" style="font-size:13px;">待发射</div>
  </div>
</div>

<!-- Control panel -->
<div id="panel">
  <label>发射速度（切向）</label>
  <input type="range" id="speed-slider" min="0" max="20" step="0.1" value="7.9">
  <span id="speed-val">7.9</span>
  <span id="speed-label">km/s</span>

  <div class="preset-btns">
    <button class="preset-btn active" data-speed="7.9">7.9 圆轨道</button>
    <button class="preset-btn" data-speed="11.2">11.2 逃逸</button>
    <button class="preset-btn" data-speed="16.7">16.7 日心逃逸</button>
    <button class="preset-btn" data-speed="3.1">3.1 GEO</button>
    <button class="preset-btn" data-speed="5.0">5.0 椭圆</button>
  </div>

  <label>初始高度</label>
  <input type="range" id="alt-slider" min="100" max="800" step="10" value="200">
  <span id="alt-val" style="display:block;text-align:center;font-size:13px;color:#aaa;margin-top:2px;">200 km</span>

  <button id="launch-btn">🚀 发射</button>
</div>

<div id="hint">🖱 拖拽旋转 · 滚轮缩放 · 调速度观察轨道变化</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="app.js"></script>
</body>
</html>
